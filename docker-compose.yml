services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobportal
      POSTGRES_PASSWORD: jobportal
      POSTGRES_DB: jobportal
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobportal -d jobportal"]
      interval: 3s
      timeout: 5s
      retries: 10
