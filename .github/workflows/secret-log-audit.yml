name: Secret log audit

on:
  workflow_run:
    workflows:
      - CI
      - Deploy
      - Validate database schema
      - Validate database seed
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  audit-completed-workflow:
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download workflow run logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id="${{ github.event.workflow_run.id }}"
          gh run download "${run_id}" --dir audit-logs --repo "${{ github.repository }}"

      - name: Scan downloaded logs for credential leaks
        run: |
          set -euo pipefail
          chmod +x scripts/audit-workflow-logs.sh
          shopt -s globstar nullglob
          found=0
          for log in audit-logs/**/*.txt audit-logs/**/*.log; do
            if [[ -f "${log}" ]]; then
              if ! ./scripts/audit-workflow-logs.sh --log-file "${log}" --fail-on-match; then
                found=1
              fi
            fi
          done
          if [[ "${found}" -eq 1 ]]; then
            echo "::error::Completed workflow logs may contain exposed secrets. Review the triggering run and rotate affected credentials."
            exit 1
          fi
          echo "No suspicious credential patterns found in workflow run logs."
