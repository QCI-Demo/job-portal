name: Validate database schema

on:
  push:
  pull_request:

jobs:
  postgres-schema:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobportal
          POSTGRES_PASSWORD: jobportal
          POSTGRES_DB: jobportal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobportal -d jobportal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: jobportal
      PGPASSWORD: jobportal
      PGDATABASE: jobportal
      DATABASE_URL: postgresql://jobportal:jobportal@localhost:5432/jobportal?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply SQL migration and run sample queries
        run: |
          psql -v ON_ERROR_STOP=1 -f db/migrations/000001_initial_job_portal_schema.up.sql
          psql -v ON_ERROR_STOP=1 -f db/sample_queries.sql

      - name: Verify unique (job, candidate) constraint
        run: psql -v ON_ERROR_STOP=1 -f db/constraint_tests.sql

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Seed and validate sample data via Prisma
        run: |
          npm run db:seed
          npm run db:seed:validate
